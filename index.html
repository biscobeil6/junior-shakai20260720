<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#5c6ac4">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>受験暗記アプリ</title>
  <link rel="stylesheet" href="style.css?v=4">
</head>
<body>
  <div id="app" class="app-shell">
    <header class="app-header">
      <button id="homeBtn" class="icon-btn" aria-label="ホーム">⌂</button>
      <div><h1 id="headerTitle">受験暗記アプリ</h1><p id="headerSub">社会・周回学習</p></div>
      <button id="statsBtn" class="icon-btn" aria-label="成績">成績</button>
    </header>
    <main id="main" tabindex="-1"></main>
  </div>
  <div id="rewardModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="rewardTitle">
    <div class="modal-card reward-card">
      <h2 id="rewardTitle">10問達成！</h2>
      <div class="reward-stage"><div id="rewardBlur" class="reward-blur"></div><img id="rewardImage" class="reward-image" alt="ごほうび画像"></div>
      <p id="rewardCaption"></p><button id="rewardContinue" class="primary-btn">つづける</button>
    </div>
  </div>
  <script src="app.js?v=4"></script>
</body>
</html>
